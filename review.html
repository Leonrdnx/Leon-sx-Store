<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews - Leon'sx Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f11;
            --primary: #8b5cf6;
            --accent: #d946ef;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SCROLL ANIMATIONS --- */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
            will-change: opacity, transform;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Header / Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            background: rgba(5, 5, 5, 0.3);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .login-btn {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 5rem 5% 3rem;
            position: relative;
            overflow: hidden;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Aurora Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }

        .blob-1 { top: -10%; left: 20%; width: 300px; height: 300px; background: var(--primary); animation-delay: 0s; }
        .blob-2 { bottom: 10%; right: 20%; width: 250px; height: 250px; background: var(--accent); animation-delay: 2s; }
        .blob-3 { top: 40%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; background: #4c1d95; opacity: 0.4; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .hero h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to bottom right, #ffffff 30%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 2;
        }

        .hero p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
            position: relative;
            z-index: 2;
            font-weight: 300;
        }

        /* Reviews Grid */
        .reviews-container {
            padding: 2rem 5% 5rem;
            position: relative;
            z-index: 2;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .review-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .review-card:hover {
            transform: translateY(-5px);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.1rem;
        }

        .reviewer-name {
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
        }

        .review-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stars {
            color: #fbbf24;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .product-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .review-text {
            color: #e2e8f0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .loading-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 3rem 5%;
            margin-top: auto;
            background: rgba(5, 5, 5, 0.5);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
        }

        .footer-brand {
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.3rem;
            letter-spacing: -0.5px;
        }

        .footer-copyright {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer-right {
            display: flex;
            gap: 1rem;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-link:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(5, 5, 5, 0.95);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border-color);
                padding: 2rem;
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
                display: none;
                transform: none;
            }
            .nav-links.active { display: flex; }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="image.png" alt="Logo" style="width: 40px; height: 40px; object-fit: contain; border-radius: 8px;">
            <div class="logo">Leon'sx Store</div>
        </div>
        <div class="nav-links">
            <a href="index.html#products" class="nav-link">Products</a>
            <a href="index.html#faq" class="nav-link">FaQ</a>
            <a href="index.html#tutorial" class="nav-link">Tutorial</a>
            <a href="index.html#contact" class="nav-link">Contact</a>
            <a href="testimoni.html" class="nav-link">Testimoni</a>
            <a href="review.html" class="nav-link active">Reviews</a>
        </div>
        <div class="nav-right">
            <a href="https://leonsx-store.myr.id/portal" target="_blank" class="login-btn">
                <i class="fas fa-user"></i> Login
            </a>
            <button class="menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <header class="hero reveal">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <h1>What Our Customers Say</h1>
        <p>Real feedback from real customers. We pride ourselves on delivering the best digital products and service.</p>
    </header>

    <section class="reviews-container">
        <div class="reviews-grid" id="reviewsGrid">
            <div class="loading-container">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 1rem;">Loading reviews...</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-left">
                <div class="footer-brand">Leon'sx Store</div>
                <div class="footer-copyright">&copy; 2026 • All rights reserved.</div>
            </div>
            <div class="footer-right">
                <a href="#" class="social-link"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // REPLACE THIS URL WITH YOUR ACTUAL GOOGLE APPS SCRIPT WEB APP URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIpNGDSh33lJtFDChiUXczdpU_xqbZ5mGhILqIenHO_VijX1ttreIiuzBdx49XhVJ5/exec";

        async function loadReviews() {
            const grid = document.getElementById('reviewsGrid');

            try {
                // Added redirect: 'follow' to handle Google's 302 redirects
                const response = await fetch(SCRIPT_URL, {
                    method: 'GET',
                    redirect: 'follow'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();

                if (result.status === 'success' && result.data) {
                    grid.innerHTML = ''; // Clear loading

                    // Reverse to show newest first
                    const reviews = result.data.reverse();

                    if (reviews.length === 0) {
                        grid.innerHTML = `<div class="loading-container">No reviews yet. Be the first to review!</div>`;
                        return;
                    }

                    reviews.forEach((review, index) => {
                        // Create card
                        const card = document.createElement('div');
                        card.className = 'review-card reveal';
                        card.style.animationDelay = `${index * 0.1}s`;

                        // Generate stars
                        const starsHtml = Array(5).fill(0).map((_, i) =>
                            `<i class="${i < review.rating ? 'fas' : 'far'} fa-star"></i>`
                        ).join('');

                        // Initials for avatar
                        const initials = review.customerName
                            ? review.customerName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase()
                            : 'AN';

                        // Format Date
                        const dateObj = new Date(review.date);
                        const dateStr = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

                        card.innerHTML = `
                            <div class="review-header">
                                <div class="reviewer-info">
                                    <div class="avatar">${initials}</div>
                                    <div>
                                        <div class="reviewer-name">${review.customerName || 'Anonymous'}</div>
                                        <div class="review-date">${dateStr}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="stars">${starsHtml}</div>
                            <div class="product-tag"><i class="fas fa-tag"></i> ${review.productName}</div>
                            <div class="review-text">"${review.review}"</div>
                        `;
                        grid.appendChild(card);
                    });

                    // Trigger animations
                    setTimeout(() => {
                        document.querySelectorAll('.review-card').forEach(el => el.classList.add('active'));
                    }, 100);

                } else {
                    throw new Error("Invalid data format");
                }

            } catch (error) {
                console.error("Error loading reviews:", error);
                grid.innerHTML = `
                    <div class="loading-container">
                        <p style="color: #ef4444;">Failed to load reviews.</p>
                        <p style="font-size: 0.8rem;">${error.message}</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">
                            Note: If you are the admin, please ensure you have deployed the Google Apps Script as a <strong>New Version</strong> after adding the doGet function.
                        </p>
                    </div>
                `;
            }
        }

        // Mobile Menu Logic
        const menuBtn = document.querySelector('.menu-btn');
        const navLinks = document.querySelector('.nav-links');
        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = menuBtn.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });

        // Reveal Animation on Scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Start loading
        loadReviews();
    </script>
</body>
</html>
