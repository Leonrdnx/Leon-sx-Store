<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - Digital Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f11;
            --primary: #8b5cf6;
            --accent: #d946ef;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .order-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Status Header */
        .status-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .status-icon.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }

        .status-icon.pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border-color: rgba(245, 158, 11, 0.2);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
        }

        .status-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .order-id {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-family: monospace;
            background: rgba(255,255,255,0.05);
            padding: 0.2rem 0.8rem;
            border-radius: 4px;
        }

        /* Product Summary */
        .product-summary {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prod-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .prod-variant {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .prod-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Account Details (Dropdowns) */
        .accounts-section {
            margin-bottom: 2rem;
        }

        .section-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .account-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .account-card:hover {
            border-color: var(--primary);
        }

        .account-card details {
            width: 100%;
        }

        .account-card summary {
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            color: #fff;
        }

        .account-card summary::-webkit-details-marker {
            display: none;
        }

        .account-card summary::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            transition: transform 0.3s;
            color: var(--text-muted);
        }

        .account-card details[open] summary::after {
            transform: rotate(180deg);
        }

        .account-content {
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid var(--border-color);
            margin-top: 0.5rem;
            padding-top: 1rem;
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 0.8rem;
            border-radius: 8px;
        }

        .field-row:last-child {
            margin-bottom: 0;
        }

        .field-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 0.2rem;
        }

        .field-value {
            font-family: monospace;
            font-size: 0.95rem;
            color: #fff;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-left: 1rem;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: var(--primary);
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            grid-column: span 2;
        }

        .btn-primary:hover {
            background: var(--accent);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }

        /* Loading State */
        #loadingState {
            text-align: center;
            padding: 2rem;
        }

        .hidden { display: none; }

        /* Decorative Elements */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: -1;
            animation: float 15s infinite ease-in-out;
        }
        .blob-1 { top: 10%; left: 10%; width: 300px; height: 300px; background: var(--primary); animation-delay: 0s; }
        .blob-2 { bottom: 10%; right: 10%; width: 350px; height: 350px; background: var(--accent); animation-delay: 3s; }
        .blob-3 { top: 50%; left: 50%; width: 200px; height: 200px; background: #4c1d95; animation-delay: 6s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="page-wrapper">
        <div class="order-container">
            <!-- Loading -->
            <div id="loadingState">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
                <p style="margin-top: 1rem; color: var(--text-muted);">Verifying your order...</p>
            </div>

            <!-- Content -->
            <div id="orderContent" class="hidden">
                <div class="status-header">
                    <div class="status-icon" id="statusIcon">
                        <i class="fas fa-check"></i>
                    </div>
                    <h1 class="status-title" id="statusTitle">Payment Successful!</h1>
                    <span class="order-id" id="displayOrderId">ID: #LOADING</span>
                </div>

                <div class="product-summary">
                    <div>
                        <div style="font-size: 0.85rem; color: var(--text-muted);">Product</div>
                        <div class="prod-name" id="prodName">Loading...</div>
                        <div class="prod-variant" id="prodVariant"></div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.85rem; color: var(--text-muted);">Total</div>
                        <div class="prod-price" id="prodPrice">Rp 0</div>
                    </div>
                </div>

                <div class="accounts-section" id="accountsSection">
                    <label class="section-label">Your Items / Accounts</label>
                    <div id="accountsList">
                        <!-- Dynamic Account Dropdowns will be injected here -->
                    </div>
                </div>

                <div class="action-grid" id="actionButtons">
                    <!-- Buttons will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, runTransaction, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { firebaseConfig, WORKER_URL } from './config.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id'); // Now we expect 'id' to be our Custom Order ID

        if (!orderId) {
            alert("No Order ID found!");
            window.location.href = 'index.html';
        }

        async function init() {
            document.getElementById('displayOrderId').textContent = `ID: #${orderId}`;

            try {
                // 1. Get Order Data from Firestore using Custom Order ID
                const orderRef = doc(db, "orders", orderId);
                const orderSnap = await getDoc(orderRef);

                if (!orderSnap.exists()) {
                    throw new Error("Order not found in database.");
                }

                const orderData = orderSnap.data();
                renderBasicInfo(orderData);

                if (orderData.status === "PAID") {
                    // Order already paid, show items
                    renderSuccess(orderData);
                } else {
                    // Order UNPAID, verify with Worker using the stored Invoice ID
                    await verifyPayment(orderData);
                }

            } catch (error) {
                console.error("Error:", error);
                renderError(error.message);
            }
        }

        function renderBasicInfo(data) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('orderContent').classList.remove('hidden');

            document.getElementById('prodName').textContent = `${data.productName} (x${data.quantity})`;
            if(data.variantName && data.variantName !== 'Standard') {
                document.getElementById('prodVariant').textContent = data.variantName;
            }
            document.getElementById('prodPrice').textContent = formatRupiah(data.totalAmount);
        }

        async function verifyPayment(orderData) {
            renderPending(); // Show pending state first

            try {
                // Call Worker to check Mayar status using the stored Invoice ID
                const invoiceId = orderData.invoiceId;
                if (!invoiceId) {
                    throw new Error("Invoice ID missing in order data");
                }

                const response = await fetch(`${WORKER_URL}/api/check-invoice?id=${invoiceId}`);
                const result = await response.json();

                // FIX: Check for "paid" (lowercase) as well
                if (result.success && (result.status === "PAID" || result.status === "paid")) {
                    // Payment Confirmed! Now process delivery.
                    await processDelivery(orderData);
                } else {
                    // Still unpaid or expired
                    renderPending(result.status, orderData.paymentLink);
                }
            } catch (error) {
                console.error("Verification failed:", error);
                // Keep showing pending state if verification fails (network error etc)
            }
        }

        async function processDelivery(orderData) {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingState').querySelector('p').textContent = "Processing delivery...";
            document.getElementById('orderContent').classList.add('hidden');

            try {
                await runTransaction(db, async (transaction) => {
                    // 1. Read Product Secret Doc (product_secrets)
                    const secretRef = doc(db, "product_secrets", orderData.productId);
                    const secretDoc = await transaction.get(secretRef);

                    // Also read Public Product Doc to update stock count
                    const publicRef = doc(db, "products", orderData.productId);
                    const publicDoc = await transaction.get(publicRef);

                    if (!secretDoc.exists() || !publicDoc.exists()) {
                        throw new Error("Product data not found!");
                    }

                    const secretData = secretDoc.data();
                    const publicData = publicDoc.data();

                    let itemsToDeliver = [];
                    let newSecretVariants = [];
                    let newPublicVariants = [];

                    // Logic for Variants vs Single Product
                    if (orderData.variantIndex !== -1 && secretData.variants) {
                        // Variant Logic
                        const variantIndex = orderData.variantIndex;
                        const secretVariant = secretData.variants[variantIndex];
                        const publicVariant = publicData.variants[variantIndex];

                        const accounts = secretVariant.accounts || [];

                        // Filter unsold accounts
                        const availableAccounts = accounts.filter(acc => !acc.isSold);

                        if (availableAccounts.length < orderData.quantity) {
                            throw new Error("Stock habis saat proses pengiriman!");
                        }

                        // Take items
                        itemsToDeliver = availableAccounts.slice(0, orderData.quantity);

                        // Mark as Sold in Secret Data
                        // We need to find the index of these items in the original array to update them
                        // Or simpler: just update the objects we took

                        // Clone the accounts array to modify
                        const updatedAccounts = [...accounts];
                        let deliveredCount = 0;

                        for (let i = 0; i < updatedAccounts.length; i++) {
                            if (!updatedAccounts[i].isSold && deliveredCount < orderData.quantity) {
                                updatedAccounts[i] = { ...updatedAccounts[i], isSold: true, soldTo: orderData.orderId };
                                deliveredCount++;
                            }
                        }

                        // Update Secret Variant
                        newSecretVariants = [...secretData.variants];
                        newSecretVariants[variantIndex] = {
                            ...secretVariant,
                            accounts: updatedAccounts
                        };

                        // Update Public Variant Stock Count
                        newPublicVariants = [...publicData.variants];
                        const newStockCount = (publicVariant.stockCount || 0) - orderData.quantity;
                        newPublicVariants[variantIndex] = {
                            ...publicVariant,
                            stockCount: newStockCount
                        };

                        // Update Docs
                        transaction.update(secretRef, { variants: newSecretVariants });
                        transaction.update(publicRef, { variants: newPublicVariants });

                    } else {
                        // Single Product Logic (Assuming similar structure in product_secrets)
                        const accounts = secretData.accounts || [];
                        const availableAccounts = accounts.filter(acc => !acc.isSold);

                        if (availableAccounts.length < orderData.quantity) {
                            throw new Error("Stock habis saat proses pengiriman!");
                        }

                        itemsToDeliver = availableAccounts.slice(0, orderData.quantity);

                        const updatedAccounts = [...accounts];
                        let deliveredCount = 0;

                        for (let i = 0; i < updatedAccounts.length; i++) {
                            if (!updatedAccounts[i].isSold && deliveredCount < orderData.quantity) {
                                updatedAccounts[i] = { ...updatedAccounts[i], isSold: true, soldTo: orderData.orderId };
                                deliveredCount++;
                            }
                        }

                        // Update Secret Doc
                        transaction.update(secretRef, { accounts: updatedAccounts });

                        // Update Public Doc Stock
                        const newStock = (publicData.stock || 0) - orderData.quantity;
                        transaction.update(publicRef, { stock: newStock });
                    }

                    // 2. Update Order Doc (Set PAID & Add Items)
                    const orderRef = doc(db, "orders", orderId);
                    transaction.update(orderRef, {
                        status: "PAID",
                        deliveredItems: itemsToDeliver,
                        paidAt: new Date()
                    });

                    return itemsToDeliver;
                });

                // Transaction Success! Reload page to show data
                window.location.reload();

            } catch (error) {
                console.error("Delivery Transaction Failed:", error);
                alert("Gagal memproses pengiriman: " + error.message + ". Silakan hubungi admin.");
                renderError("Delivery Failed. Contact Admin.");
            }
        }

        function renderSuccess(data) {
            const icon = document.getElementById('statusIcon');
            icon.className = 'status-icon success';
            icon.innerHTML = '<i class="fas fa-check"></i>';
            document.getElementById('statusTitle').textContent = "Payment Successful!";

            const listContainer = document.getElementById('accountsList');
            listContainer.innerHTML = '';

            const items = data.deliveredItems || [];

            if (items.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; color:var(--text-muted);">No items delivered. Contact support.</div>`;
            } else {
                items.forEach((item, index) => {
                    let contentHtml = '';

                    // Handle structure from product_secrets
                    if (item.email) contentHtml += createFieldRow('Email', item.email);
                    if(item.password) contentHtml += createFieldRow('Password', item.password);
                    if(item.emailpass) contentHtml += createFieldRow('Email Pass', item.emailpass);
                    if(item.license) contentHtml += createFieldRow('License Key', item.license);
                    if(item.note) contentHtml += createFieldRow('Note', item.note);

                    // Fallback if empty
                    if(contentHtml === '') {
                         contentHtml = `<div style="padding:1rem; color:var(--text-muted);">Detail akun tersembunyi atau format tidak dikenali.</div>`;
                    }

                    const itemHtml = `
                        <div class="account-card">
                            <details ${index === 0 ? 'open' : ''}>
                                <summary>
                                    <span><i class="fas fa-box-open" style="color:var(--primary); margin-right:8px;"></i> Item #${index + 1}</span>
                                </summary>
                                <div class="account-content">
                                    ${contentHtml}
                                </div>
                            </details>
                        </div>
                    `;
                    listContainer.innerHTML += itemHtml;
                });
            }

            // Buttons
            const btnContainer = document.getElementById('actionButtons');
            btnContainer.innerHTML = `
                <a href="https://wa.me/6281350919038" target="_blank" class="btn btn-outline">
                    <i class="fab fa-whatsapp"></i> Help
                </a>
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            `;
        }

        function renderPending(status = "UNPAID", paymentLink = "#") {
            const icon = document.getElementById('statusIcon');
            icon.className = 'status-icon pending';
            icon.innerHTML = '<i class="fas fa-clock"></i>';
            document.getElementById('statusTitle').textContent = "Waiting for Payment";

            document.getElementById('accountsSection').style.display = 'none';

            const btnContainer = document.getElementById('actionButtons');
            btnContainer.innerHTML = `
                <button onclick="window.location.reload()" class="btn btn-outline">
                    <i class="fas fa-sync"></i> Refresh Status
                </button>
                <a href="${paymentLink}" class="btn btn-primary" style="background: var(--warning); color: #000;">
                    <i class="fas fa-credit-card"></i> Pay Now
                </a>
            `;
        }

        function renderError(msg) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('orderContent').classList.remove('hidden');
            document.getElementById('statusTitle').textContent = "Error";
            document.getElementById('accountsSection').innerHTML = `<p style="text-align:center; color:var(--danger);">${msg}</p>`;
        }

        function createFieldRow(label, value) {
            return `
                <div class="field-row">
                    <div style="overflow:hidden;">
                        <span class="field-label">${label}</span>
                        <span class="field-value">${value}</span>
                    </div>
                    <button class="copy-btn" onclick="copyText('${value}', this)">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            `;
        }

        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        window.copyText = function(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalIcon = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                btn.style.background = 'var(--success)';
                setTimeout(() => {
                    btn.innerHTML = originalIcon;
                    btn.style.background = '';
                }, 2000);
            });
        }

        // Start
        init();

    </script>
</body>
</html>
